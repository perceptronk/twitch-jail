<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Jail Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chivo:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/overlay.css?v=20260524c" />
  </head>
  <body>
    <main class="screen">
      <section class="cells" aria-label="Timed out users">
        <h2>Timeout Cell</h2>
        <div id="timeoutList" class="bars"></div>
      </section>

      <section class="death-row" aria-label="Banned users">
        <h2>Death Row</h2>
        <div id="deathRowList" class="bars"></div>
      </section>

      <div id="executionStage" class="execution-stage" aria-live="polite"></div>


    </main>

    <script src="/static/overlay.js?v=20260524c" type="module"></script>
  </body>
</html>
