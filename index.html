<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Jail Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chivo:wght@400;700&display=swap" rel="stylesheet" />
    <style>
:root {
  --wall-a: #8d6a3f;
  --wall-b: #5c3f22;
  --bar-dark: #1f2937;
  --bar-light: #4b5563;
  --door: #2f3541;
  --ink: #fff7d6;
  --badge: #f59e0b;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  font-family: "Chivo", sans-serif;
  color: var(--ink);
  background: transparent;
  overflow: auto;
}

.screen {
  min-height: 100vh;
  padding: 24px;
  display: grid;
  grid-template-rows: 440px auto;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.headline {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 2px dashed rgb(255 245 200 / 35%);
  padding-bottom: 8px;
  animation: fadein 650ms ease;
}

.headline h1 {
  margin: 0;
  font-family: "Bebas Neue", sans-serif;
  letter-spacing: 1px;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: #fff1b0;
  text-shadow: 0 3px 0 rgb(0 0 0 / 28%);
  animation: titleflicker 7s ease-in-out infinite;
}

.headline p {
  margin: 0;
  font-size: 1rem;
  text-transform: uppercase;
  color: #fff4c8;
}

.cells,
.death-row {
  border-radius: 14px;
  border: 2px solid rgb(20 20 20 / 42%);
  background:
    linear-gradient(rgb(0 0 0 / 12%), rgb(0 0 0 / 32%)),
    linear-gradient(180deg, #7a5730, #5f4225);
  box-shadow: inset 0 10px 22px rgb(0 0 0 / 26%);
  padding: 14px;
  display: grid;
  grid-template-rows: auto 1fr;
}

.cells {
  animation: cellglow 5s ease-in-out infinite;
}

.death-row {
  position: relative;
  animation: deathglow 4s ease-in-out infinite;
}

.cells h2,
.death-row h2 {
  margin: 0 0 10px;
  font-family: "Bebas Neue", sans-serif;
  font-size: 3.6rem;
  letter-spacing: 0.8px;
}

.bars {
  position: relative;
  border-radius: 12px;
  border: 3px solid rgb(20 20 20 / 44%);
  background:
    radial-gradient(circle at 80% 0%, rgb(255 255 255 / 8%), transparent 40%),
    linear-gradient(180deg, #323845, #232933 40%, #1c222b);
  padding: 10px;
  display: block;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

.bars::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: linear-gradient(
    110deg,
    transparent 20%,
    rgb(255 255 255 / 7%) 50%,
    transparent 80%
  );
  animation: barshimmer 7s linear infinite;
}

.bars::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
  background:
    repeating-linear-gradient(
      90deg,
      rgb(0 0 0 / 35%) 0 6px,
      rgb(90 102 121 / 98%) 6px 23px,
      rgb(0 0 0 / 36%) 23px 26px,
      transparent 26px 60px
    );
}

.prisoner-card {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
  height: calc(100% - 20px);
  aspect-ratio: 1 / 1;
  border-radius: 14px;
  border: 2px solid rgb(255 255 255 / 18%);
  background: rgb(9 11 15 / 62%);
  overflow: hidden;
  will-change: transform;
  animation: slidein 420ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

.prisoner-card img {
  width: 100%;
  height: 100%;
  border-radius: 0;
  object-fit: cover;
  border: 0;
}

.prisoner-id {
  position: absolute;
  left: 6px;
  right: 6px;
  bottom: 8px;
  z-index: 3;
  border-radius: 8px;
  padding: 5px 8px;
  text-align: center;
  background: rgb(15 23 42 / 92%);
  border: 1px solid rgb(255 255 255 / 34%);
  color: #f8fafc;
  font-size: clamp(1.45rem, 2.1vw, 2.05rem);
  font-weight: 800;
  line-height: 1;
  letter-spacing: 0.02em;
  text-shadow: 0 1px 1px rgb(0 0 0 / 72%);
}

.status-chip {
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: 3;
  border-radius: 999px;
  padding: 2px 6px;
  font-size: 0.66rem;
  font-weight: 700;
  background: rgb(14 116 144 / 88%);
  color: #ecfeff;
  border: 1px solid rgb(255 255 255 / 26%);
  animation: chippulse 1.8s ease-in-out infinite;
}

.empty-note {
  position: relative;
  z-index: 2;
  display: inline-block;
  margin: 14px;
  color: rgb(255 245 220 / 82%);
  font-size: 0.92rem;
  padding: 4px 2px;
}

.execution-stage {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 40;
  border-radius: 12px;
  overflow: hidden;
}

.execution-banner {
  position: absolute;
  inset: auto 12px 12px 12px;
  max-width: none;
  padding: 12px 14px;
  font-size: clamp(0.78rem, 0.95vw, 0.92rem);
  border-radius: 10px;
  border: 2px solid rgb(245 158 11 / 68%);
  background: rgb(66 32 6 / 90%);
  color: #fff7d6;
  z-index: 42;
  animation: bannerlifecycle 4.8s ease forwards;
}

.actor {
  color: #fde68a;
}

.catapult-scene,
.plank-scene {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid rgb(255 255 255 / 28%);
  background: linear-gradient(180deg, rgb(19 31 51 / 92%), rgb(15 23 42 / 88%));
  z-index: 41;
  animation: scenelifecycle 4.8s ease forwards;
}

.catapult-scene::before,
.plank-scene::before {
  content: "";
  position: absolute;
  inset: 0;
  background: white;
  z-index: 50;
  pointer-events: none;
  animation: sceneflash 0.5s ease-out forwards;
}

.execution-sky {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 16%, rgb(255 255 255 / 22%), transparent 35%),
    linear-gradient(180deg, rgb(56 96 157 / 40%), transparent 50%);
}

.catapult-ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 27%;
  background:
    repeating-linear-gradient(
      -8deg,
      rgb(0 0 0 / 12%) 0 14px,
      transparent 14px 28px
    ),
    linear-gradient(180deg, #566279, #414d61);
}

.catapult-rig {
  position: absolute;
  left: 10%;
  bottom: 18%;
  width: clamp(160px, 30%, 250px);
  height: clamp(110px, 36%, 160px);
}

.catapult-wheel {
  position: absolute;
  bottom: 2%;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 5px solid #312f38;
  background: radial-gradient(circle at 35% 35%, #facc15, #ca8a04);
}

.catapult-wheel-left {
  left: 10%;
}

.catapult-wheel-right {
  left: 54%;
}

.catapult-frame {
  position: absolute;
  left: 8%;
  right: 12%;
  bottom: 18%;
  height: 20px;
  border-radius: 8px;
  background: linear-gradient(180deg, #c08433, #92400e);
  border: 2px solid rgb(38 20 6 / 42%);
}

.catapult-arm {
  position: absolute;
  left: 47%;
  bottom: 26%;
  width: 14px;
  height: 82px;
  border-radius: 10px;
  background: linear-gradient(180deg, #fbbf24, #a16207);
  transform-origin: 50% 100%;
  animation: armthrow 0.75s cubic-bezier(0.17, 0.67, 0.12, 1.08) 0.28s both;
}

.catapult-bucket {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 14px;
  border-radius: 6px;
  background: #334155;
}

.execution-prisoner {
  position: absolute;
  width: clamp(72px, 10vw, 96px);
  height: clamp(72px, 10vw, 96px);
}

.execution-prisoner-face {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  border: 2px solid rgb(255 255 255 / 18%);
  background: rgb(9 11 15 / 62%);
  overflow: hidden;
}

.execution-prisoner .prisoner-avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.execution-prisoner .prisoner-id {
  position: absolute;
  top: calc(100% + 5px);
  left: 50%;
  right: auto;
  bottom: auto;
  transform: translateX(-50%);
  white-space: nowrap;
  width: max-content;
  font-size: clamp(0.95rem, 1.4vw, 1.1rem);
  padding: 3px 9px;
}

.catapult-victim {
  left: 10%;
  bottom: 31%;
  will-change: transform, opacity;
  backface-visibility: hidden;
  animation: catapult-flight 1.5s linear 0.28s forwards;
}

.plank-water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 24%;
  background:
    repeating-linear-gradient(
      -14deg,
      rgb(255 255 255 / 14%) 0 8px,
      transparent 8px 18px
    ),
    linear-gradient(180deg, #22d3ee, #0369a1);
  background-size: 36px 36px, 100% 100%;
  animation: waterflow 2.4s linear infinite;
}

.plank-dock {
  position: absolute;
  left: 0;
  bottom: 24%;
  width: 32%;
  height: 30%;
  background: linear-gradient(180deg, #6b3f1f, #4a2a16);
  border-right: 4px solid rgb(32 18 8 / 52%);
}

.plank {
  position: absolute;
  left: 26%;
  bottom: 38%;
  width: 34%;
  height: 18px;
  border-radius: 8px;
  background: linear-gradient(180deg, #6b3f1f, #4a2a16);
  border: 1px solid rgb(32 18 8 / 52%);
  box-shadow: 0 4px 0 rgb(44 25 10 / 58%);
}

.plank-victim {
  left: 30.5%;
  bottom: 44%;
  will-change: transform, opacity;
  animation: plank-walk-fall 2.85s linear 0.28s forwards;
}

.splash {
  position: absolute;
  bottom: 11%;
  right: 30%;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  opacity: 0;
  animation: splash-core 0.95s ease-out 3.06s forwards;
}

.splash::before,
.splash::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  opacity: 0;
}

.splash::before {
  border: 4px solid rgb(186 230 253 / 82%);
  animation: splash-ring-outer 1.05s ease-out 3.06s forwards;
}

.splash::after {
  border: 3px solid rgb(224 242 254 / 88%);
  inset: 14px;
  animation: splash-ring-inner 0.9s ease-out 3.12s forwards;
}

.methods {
  grid-column: 1 / -1;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  font-size: 0.85rem;
  color: rgb(255 245 220 / 82%);
}

@media (max-width: 800px) {
  .screen {
    padding: 12px;
    gap: 10px;
  }
}

/* ── keyframes ────────────────────────────────────────────────────────── */

@keyframes slidein {
  from {
    opacity: 0;
    transform: translateY(-16px) scale(0.85);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes fadein {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeout {
  0% { opacity: 0; }
  8% { opacity: 1; }
  90% { opacity: 1; }
  100% { opacity: 0; }
}

/* occasional torch-flicker on the title */
@keyframes titleflicker {
  0%, 89%, 100% {
    text-shadow: 0 3px 0 rgb(0 0 0 / 28%);
    opacity: 1;
  }
  91% {
    text-shadow: 0 3px 0 rgb(0 0 0 / 28%), 0 0 26px rgb(255 220 60 / 74%);
    opacity: 0.84;
  }
  92.5% {
    text-shadow: 0 3px 0 rgb(0 0 0 / 28%), 0 0 10px rgb(255 220 60 / 36%);
    opacity: 1;
  }
  94.5% {
    text-shadow: 0 3px 0 rgb(0 0 0 / 28%), 0 0 32px rgb(255 220 60 / 82%);
    opacity: 0.80;
  }
  96% {
    text-shadow: 0 3px 0 rgb(0 0 0 / 28%), 0 0 16px rgb(255 220 60 / 48%);
    opacity: 0.96;
  }
}

/* slow light sweep across each cell interior */
@keyframes barshimmer {
  0% { transform: translateX(-100%); opacity: 0; }
  12% { opacity: 1; }
  88% { opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}

/* countdown chip heartbeat */
@keyframes chippulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgb(14 116 144 / 0%); }
  50% { opacity: 0.76; box-shadow: 0 0 6px 2px rgb(14 116 144 / 42%); }
}

/* blue ambient glow for timeout cells */
@keyframes cellglow {
  0%, 100% { box-shadow: inset 0 10px 22px rgb(0 0 0 / 26%), 0 0 6px 0 rgb(37 99 235 / 0%); }
  50% { box-shadow: inset 0 10px 22px rgb(0 0 0 / 26%), 0 0 16px 3px rgb(37 99 235 / 20%); }
}

/* ominous red pulse for death row */
@keyframes deathglow {
  0%, 100% { box-shadow: inset 0 10px 22px rgb(0 0 0 / 26%), 0 0 6px 0 rgb(220 38 38 / 0%); }
  50% { box-shadow: inset 0 10px 22px rgb(0 0 0 / 26%), 0 0 20px 4px rgb(220 38 38 / 30%); }
}

/* execution scene: fade in + fade out */
@keyframes scenelifecycle {
  0% { opacity: 0; transform: scale(0.97); }
  7% { opacity: 1; transform: scale(1.01); }
  11% { transform: scale(1); }
  88% { opacity: 1; }
  100% { opacity: 0; }
}

/* white flash when scene enters */
@keyframes sceneflash {
  from { opacity: 0.55; }
  to { opacity: 0; }
}

/* execution banner: slide up + fade out */
@keyframes bannerlifecycle {
  0% { opacity: 0; transform: translateY(20px); }
  10% { opacity: 1; transform: translateY(0); }
  88% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(6px); }
}

/* animated water ripple stripes */
@keyframes waterflow {
  from { background-position: 0 0, 0 0; }
  to { background-position: 36px 36px, 0 0; }
}

@keyframes launch {
  0% { transform: translate(0, 0) rotate(0); opacity: 1; }
  60% { transform: translate(280px, -170px) rotate(-18deg); opacity: 1; }
  100% { transform: translate(420px, -230px) rotate(-24deg); opacity: 0; }
}

/* arm starts tilted left (loaded), snaps clockwise to throw right */
@keyframes armthrow {
  0% { transform: rotate(-52deg); }
  38% { transform: rotate(74deg); }
  62% { transform: rotate(58deg); }
  100% { transform: rotate(50deg); }
}

/* full tumbling spin during catapult flight */
@keyframes catapult-flight {
  0% {
    transform: translate3d(0, 0, 0) rotate(0deg);
    opacity: 1;
  }
  18% {
    transform: translate3d(100px, -82px, 0) rotate(-72deg);
    opacity: 1;
  }
  40% {
    transform: translate3d(245px, -138px, 0) rotate(-162deg);
    opacity: 1;
  }
  62% {
    transform: translate3d(395px, -122px, 0) rotate(-238deg);
    opacity: 1;
  }
  82% {
    transform: translate3d(535px, -50px, 0) rotate(-304deg);
    opacity: 1;
  }
  100% {
    transform: translate3d(622px, 10px, 0) rotate(-352deg);
    opacity: 0;
  }
}

/* plank walk with nervous sway, then plunge */
@keyframes plank-walk-fall {
  0% {
    transform: translate3d(0, 0, 0) rotate(0deg);
    opacity: 1;
  }
  18% {
    transform: translate3d(56px, -2px, 0) rotate(-1.5deg);
    opacity: 1;
  }
  36% {
    transform: translate3d(112px, 0, 0) rotate(1deg);
    opacity: 1;
  }
  54% {
    transform: translate3d(168px, -2px, 0) rotate(-1.5deg);
    opacity: 1;
  }
  72% {
    transform: translate3d(212px, 0, 0) rotate(0deg);
    opacity: 1;
  }
  80% {
    transform: translate3d(226px, 12px, 0) rotate(22deg);
    opacity: 1;
  }
  92% {
    transform: translate3d(242px, 108px, 0) rotate(70deg);
    opacity: 1;
  }
  100% {
    transform: translate3d(252px, 194px, 0) rotate(92deg);
    opacity: 0;
  }
}

@keyframes splash-core {
  0% {
    opacity: 0;
    transform: scale(0.45);
    background: radial-gradient(circle at center, rgb(255 255 255 / 0%), rgb(34 211 238 / 0%));
  }
  25% {
    opacity: 1;
    transform: scale(0.88);
    background: radial-gradient(circle at center, rgb(255 255 255 / 90%), rgb(34 211 238 / 0%));
  }
  100% {
    opacity: 0;
    transform: scale(1.2);
    background: radial-gradient(circle at center, rgb(255 255 255 / 0%), rgb(34 211 238 / 0%));
  }
}

@keyframes splash-ring-outer {
  0% { opacity: 0; transform: scale(0.2); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: scale(1.35); }
}

@keyframes splash-ring-inner {
  0% { opacity: 0; transform: scale(0.25); }
  25% { opacity: 1; }
  100% { opacity: 0; transform: scale(1.45); }
}

/* ── controls ─────────────────────────────────────────────────────────── */

.controls {
  grid-column: 1 / -1;
  margin-top: 8px;
  padding: 16px 18px;
  border-radius: 14px;
  border: 2px solid rgb(20 20 20 / 42%);
  background:
    linear-gradient(rgb(0 0 0 / 18%), rgb(0 0 0 / 32%)),
    linear-gradient(180deg, #3a2e1e, #2a2015);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.control-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.control-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 1.1rem;
  letter-spacing: 1px;
  color: #d4a85a;
  min-width: 90px;
}

.control-sep {
  width: 1px;
  height: 26px;
  background: rgb(255 245 200 / 18%);
  margin: 0 4px;
}

.ctrl-input {
  background: rgb(10 12 18 / 72%);
  border: 1px solid rgb(255 255 255 / 18%);
  border-radius: 7px;
  color: #f8fafc;
  font-family: "Chivo", sans-serif;
  font-size: 0.88rem;
  padding: 6px 10px;
  outline: none;
  transition: border-color 0.15s;
}

.ctrl-input:focus {
  border-color: rgb(245 158 11 / 60%);
}

.ctrl-input.wide { width: 220px; }
.ctrl-input.mid  { width: 140px; }
.ctrl-input.slim { width: 110px; }

.ctrl-select {
  background: rgb(10 12 18 / 72%);
  border: 1px solid rgb(255 255 255 / 18%);
  border-radius: 7px;
  color: #f8fafc;
  font-family: "Chivo", sans-serif;
  font-size: 0.88rem;
  padding: 6px 10px;
  outline: none;
  cursor: pointer;
}

.ctrl-btn {
  border: none;
  border-radius: 7px;
  font-family: "Chivo", sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: opacity 0.12s, transform 0.1s;
}

.ctrl-btn:hover  { opacity: 0.85; }
.ctrl-btn:active { transform: scale(0.97); }

.btn-connect    { background: #16a34a; color: #f0fdf4; }
.btn-disconnect { background: #6b7280; color: #f9fafb; }
.btn-timeout    { background: #ca8a04; color: #fefce8; }
.btn-ban        { background: #c2410c; color: #fff7ed; }
.btn-execute    { background: #991b1b; color: #fef2f2; }
.btn-release    { background: #0e7490; color: #ecfeff; }

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #6b7280;
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
.status-dot.disconnected { background: #6b7280; }
.status-dot.error        { background: #ef4444; box-shadow: 0 0 6px #ef444488; }

.status-text {
  font-size: 0.8rem;
  color: rgb(255 245 220 / 60%);
}
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="cells" aria-label="Timed out users">
        <h2>Timeout Cell</h2>
        <div id="timeoutList" class="bars"></div>
      </section>

      <section class="death-row" aria-label="Banned users">
        <h2>Death Row</h2>
        <div id="deathRowList" class="bars"></div>
        <div id="executionStage" class="execution-stage" aria-live="polite"></div>
      </section>

      <section class="controls" aria-label="Dev controls">
        <div class="control-row">
          <span class="control-label">Connect</span>
          <input id="channelInput" class="ctrl-input mid" type="text" placeholder="channel" spellcheck="false" />
          <button id="connectBtn" class="ctrl-btn btn-connect">Connect</button>
          <div id="statusDot" class="status-dot"></div>
          <span id="statusText" class="status-text">disconnected</span>
        </div>
        <div class="control-row">
          <span class="control-label">Simulate</span>
          <input id="usernameInput" class="ctrl-input mid" type="text" placeholder="username" spellcheck="false" />
          <button class="ctrl-btn btn-timeout" data-action="timeout">Timeout</button>
          <button class="ctrl-btn btn-ban"     data-action="ban">Ban</button>
          <div class="control-sep"></div>
          <button class="ctrl-btn btn-release" data-action="untimeout">Untimeout</button>
          <button class="ctrl-btn btn-release" data-action="unban">Unban</button>
          <div class="control-sep"></div>
          <select id="methodSelect" class="ctrl-select">
            <option value="catapult">Catapult</option>
            <option value="plank">Plank</option>
          </select>
          <button class="ctrl-btn btn-execute" data-action="execute">Execute</button>
        </div>
      </section>
    </main>

    <script type="module">
const timeoutList = document.getElementById("timeoutList");
const deathRowList = document.getElementById("deathRowList");
const executionStage = document.getElementById("executionStage");

let currentChannel = "";
let socket = null;

const timeouts = new Map();
const deathRow = new Map();
const timeoutCards = new Map();
const deathRowCards = new Map();
const timeoutWalkers = new Map();
const deathRowWalkers = new Map();

const LANE_PADDING = 10;
const CARD_GAP = 10;

let lastMotionTick = performance.now();

function render() {
  const now = Date.now() / 1000;
  scrubLegacyPlaceholders(timeoutList);
  scrubLegacyPlaceholders(deathRowList);
  syncTimeoutCards(now);
  syncDeathRowCards();
}

function scrubLegacyPlaceholders(container) {
  const notes = container.querySelectorAll(".empty-note");
  for (const note of notes) {
    note.remove();
  }

  for (const node of Array.from(container.childNodes)) {
    if (node.nodeType === Node.TEXT_NODE && node.textContent && node.textContent.trim()) {
      node.remove();
    }
  }
}

function syncTimeoutCards(now) {
  const activeUsers = new Set();
  const expired = [];

  for (const [username, entry] of timeouts) {
    const remaining = Math.max(0, Math.ceil(entry.until - now));
    if (remaining <= 0) {
      expired.push(username);
      continue;
    }

    activeUsers.add(username);
    let card = timeoutCards.get(username);
    if (!card) {
      card = createCard(entry);
      timeoutCards.set(username, card);
      timeoutList.appendChild(card);
      ensureWalker(timeoutList, timeoutCards, timeoutWalkers, username, card);
    }
    updateCard(card, entry, `T ${remaining}s`);
  }

  for (const username of expired) {
    timeouts.delete(username);
    removeCard(timeoutCards, timeoutList, timeoutWalkers, username);
  }

  for (const username of Array.from(timeoutCards.keys())) {
    if (!activeUsers.has(username)) {
      removeCard(timeoutCards, timeoutList, timeoutWalkers, username);
    }
  }
}

function syncDeathRowCards() {
  const activeUsers = new Set();

  for (const [username, entry] of deathRow) {
    activeUsers.add(username);
    let card = deathRowCards.get(username);
    if (!card) {
      card = createCard(entry);
      deathRowCards.set(username, card);
      deathRowList.appendChild(card);
      ensureWalker(deathRowList, deathRowCards, deathRowWalkers, username, card);
    }
    updateCard(card, entry, "");
  }

  for (const username of Array.from(deathRowCards.keys())) {
    if (!activeUsers.has(username)) {
      removeCard(deathRowCards, deathRowList, deathRowWalkers, username);
    }
  }
}

function removeCard(cardMap, container, walkerMap, username) {
  const card = cardMap.get(username);
  if (card) {
    card.remove();
    cardMap.delete(username);
  }
  walkerMap.delete(username);
  const note = container.querySelector(".empty-note");
  if (note) {
    note.remove();
  }
}

function ensureWalker(container, cardMap, walkerMap, username, card) {
  if (walkerMap.has(username)) {
    return;
  }

  const cardSize = card.offsetWidth || 80;
  walkerMap.set(username, {
    x: findSpawnX(container, cardMap, walkerMap, username, cardSize),
    dir: Math.random() < 0.5 ? -1 : 1,
    speed: 28 + Math.random() * 32,
    nextFlipAt: performance.now() + 900 + Math.random() * 2200,
    phase: Math.random() * Math.PI * 2,
  });
}

function findSpawnX(container, cardMap, walkerMap, username, cardSize) {
  const laneWidth = Math.max(0, container.clientWidth - LANE_PADDING * 2);
  const maxX = Math.max(0, laneWidth - cardSize);
  if (maxX === 0) {
    return 0;
  }

  const occupied = [];
  for (const [other, state] of walkerMap) {
    if (other === username || !cardMap.has(other)) {
      continue;
    }
    occupied.push([state.x, state.x + cardSize]);
  }
  occupied.sort((a, b) => a[0] - b[0]);

  let cursor = 0;
  for (const [start, end] of occupied) {
    if (cursor + cardSize + CARD_GAP <= start) {
      return cursor;
    }
    cursor = Math.max(cursor, end + CARD_GAP);
    if (cursor > maxX) {
      return Math.random() * maxX;
    }
  }

  return Math.min(cursor, maxX);
}

function tickMotion() {
  const now = performance.now();
  const dt = Math.min((now - lastMotionTick) / 1000, 0.05);
  lastMotionTick = now;

  updateLaneMotion(timeoutList, timeoutCards, timeoutWalkers, now, dt);
  updateLaneMotion(deathRowList, deathRowCards, deathRowWalkers, now, dt);

  requestAnimationFrame(tickMotion);
}

function updateLaneMotion(container, cardMap, walkerMap, now, dt) {
  if (cardMap.size === 0) {
    return;
  }

  const cardSize = Math.max(40, container.clientHeight - LANE_PADDING * 2);
  const laneWidth = Math.max(0, container.clientWidth - LANE_PADDING * 2);
  const maxX = Math.max(0, laneWidth - cardSize);

  const walkers = [];
  for (const [username, card] of cardMap) {
    const walker = walkerMap.get(username);
    if (!walker) {
      continue;
    }

    if (now >= walker.nextFlipAt) {
      walker.dir *= -1;
      walker.nextFlipAt = now + 900 + Math.random() * 2200;
    }

    walker.x += walker.dir * walker.speed * dt;

    if (walker.x <= 0) {
      walker.x = 0;
      walker.dir = 1;
      walker.nextFlipAt = now + 900 + Math.random() * 2200;
    }
    if (walker.x >= maxX) {
      walker.x = maxX;
      walker.dir = -1;
      walker.nextFlipAt = now + 900 + Math.random() * 2200;
    }

    walkers.push({ username, card, walker });
  }

  walkers.sort((a, b) => a.walker.x - b.walker.x);
  for (let i = 0; i < walkers.length - 1; i += 1) {
    const current = walkers[i];
    const next = walkers[i + 1];
    const overlap = current.walker.x + cardSize + CARD_GAP - next.walker.x;
    if (overlap > 0) {
      const push = overlap / 2;
      current.walker.x = Math.max(0, current.walker.x - push);
      next.walker.x = Math.min(maxX, next.walker.x + push);
      current.walker.dir = -1;
      next.walker.dir = 1;
      current.walker.nextFlipAt = now + 900 + Math.random() * 2200;
      next.walker.nextFlipAt = now + 900 + Math.random() * 2200;
    }
  }

  for (const { card, walker } of walkers) {
    const bobY = Math.sin(now / 500 + walker.phase) * 3;
    card.style.transform = `translateX(${walker.x}px) translateY(${bobY}px)`;
  }
}

function createCard(entry) {
  const card = document.createElement("article");
  card.className = "prisoner-card";

  const avatar = document.createElement("img");
  avatar.className = "prisoner-avatar";
  avatar.src = entry.avatar_url;
  avatar.alt = `${entry.username} avatar`;

  const id = document.createElement("div");
  id.className = "prisoner-id";
  id.textContent = entry.username;

  card.append(avatar, id);
  return card;
}

function updateCard(card, entry, statusLabel) {
  const avatar = card.querySelector(".prisoner-avatar");
  const id = card.querySelector(".prisoner-id");

  if (avatar && avatar.src !== entry.avatar_url) {
    avatar.src = entry.avatar_url;
  }

  if (id) {
    const nextId = entry.username;
    if (id.textContent !== nextId) {
      id.textContent = nextId;
    }
  }

  let status = card.querySelector(".status-chip");
  if (statusLabel) {
    if (!status) {
      status = document.createElement("div");
      status.className = "status-chip";
      card.appendChild(status);
    }
    if (status.textContent !== statusLabel) {
      status.textContent = statusLabel;
    }
  } else if (status) {
    status.remove();
  }
}

function createExecutionPrisoner(entry) {
  const wrapper = document.createElement("article");
  wrapper.className = "execution-prisoner";

  const face = document.createElement("div");
  face.className = "execution-prisoner-face";

  const avatar = document.createElement("img");
  avatar.className = "prisoner-avatar";
  avatar.src = entry.avatar_url;
  avatar.alt = `${entry.username} avatar`;

  const id = document.createElement("div");
  id.className = "prisoner-id";
  id.textContent = entry.username;

  face.append(avatar);
  wrapper.append(face, id);
  return wrapper;
}

function runExecution(method, entry, actor) {
  const scene = document.createElement("div");
  const banner = document.createElement("div");
  banner.className = "execution-banner";
  banner.innerHTML = `<span class="actor">${actor}</span> ordered ${entry.username} to ${method}`;

  if (method === "catapult") {
    scene.className = "catapult-scene";

    const sky = document.createElement("div");
    sky.className = "execution-sky";

    const ground = document.createElement("div");
    ground.className = "catapult-ground";

    const rig = document.createElement("div");
    rig.className = "catapult-rig";
    rig.innerHTML = `
      <div class="catapult-wheel catapult-wheel-left"></div>
      <div class="catapult-wheel catapult-wheel-right"></div>
      <div class="catapult-frame"></div>
      <div class="catapult-arm">
        <div class="catapult-bucket"></div>
      </div>
    `;

    const victim = createExecutionPrisoner(entry);
    victim.classList.add("catapult-victim");

    scene.append(sky, ground, rig, victim);
  } else if (method === "plank") {
    scene.className = "plank-scene";

    const sky = document.createElement("div");
    sky.className = "execution-sky";

    const water = document.createElement("div");
    water.className = "plank-water";

    const dock = document.createElement("div");
    dock.className = "plank-dock";

    const plank = document.createElement("div");
    plank.className = "plank";

    const victim = createExecutionPrisoner(entry);
    victim.classList.add("plank-victim");

    const splash = document.createElement("div");
    splash.className = "splash";

    scene.append(sky, water, dock, plank, victim, splash);
  } else {
    return;
  }

  executionStage.append(scene, banner);
  window.setTimeout(() => {
    scene.remove();
    banner.remove();
  }, 5600);
}

/* ── IRC ──────────────────────────────────────────────────────────────── */

function parseIrcLine(line) {
  const tags = {};
  let rest = line;

  if (rest.startsWith("@")) {
    const spaceIdx = rest.indexOf(" ");
    const tagsPart = rest.slice(1, spaceIdx);
    rest = rest.slice(spaceIdx + 1);
    for (const item of tagsPart.split(";")) {
      const eq = item.indexOf("=");
      if (eq !== -1) tags[item.slice(0, eq)] = item.slice(eq + 1);
    }
  }

  if (rest.startsWith(":")) {
    rest = rest.slice(rest.indexOf(" ") + 1);
  }

  let trailing = "";
  const colonIdx = rest.indexOf(" :");
  if (colonIdx !== -1) {
    trailing = rest.slice(colonIdx + 2);
    rest = rest.slice(0, colonIdx);
  }

  const parts = rest.split(" ");
  if (!parts[0]) return null;

  return { tags, command: parts[0], params: parts.slice(1), trailing };
}

function isModerator(tags) {
  const badges = tags["badges"] || "";
  return (
    badges.includes("broadcaster/1") ||
    badges.includes("moderator/1") ||
    badges.includes("staff/1") ||
    badges.includes("admin/1")
  );
}

const avatarCache = new Map();

function dicebearUrl(username) {
  return `https://api.dicebear.com/9.x/identicon/png?seed=${encodeURIComponent(username)}`;
}

async function resolveAvatar(username) {
  if (avatarCache.has(username)) return avatarCache.get(username);
  try {
    const res = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${encodeURIComponent(username)}`);
    if (res.ok) {
      const data = await res.json();
      const user = Array.isArray(data) ? data[0] : data;
      const url = user?.profileImageURL ?? user?.profile_image_url ?? user?.logo ?? user?.avatar;
      if (url) {
        avatarCache.set(username, url);
        return url;
      }
    }
  } catch (err) {
    console.warn("[avatar] ivr.fi failed for", username, err.message);
  }
  // Don't cache failures — allow retry for the next user with the same name
  return dicebearUrl(username);
}

async function handleClearchat(tags, trailing) {
  const target = trailing.trim().toLowerCase();
  if (!target) return;

  const userId = tags["target-user-id"] || target;
  const duration = tags["ban-duration"];
  const avatar = await resolveAvatar(target);

  if (duration && /^\d+$/.test(duration)) {
    addTimeout(target, userId, avatar, parseInt(duration, 10));
  } else {
    addBan(target, userId, avatar);
  }
}

function handlePrivmsg(tags, trailing) {
  const message = trailing.trim();
  if (!message.startsWith("!execute")) return;
  if (!isModerator(tags)) return;

  const parts = message.split(/\s+/);
  if (parts.length !== 3) return;

  const target = parts[1].replace(/^@/, "").toLowerCase();
  const method = parts[2].toLowerCase();
  if (method !== "catapult" && method !== "plank") return;

  const actor = tags["display-name"] || tags["login"] || "mod";
  executeEntry(target, method, actor);
}

/* ── state mutations ──────────────────────────────────────────────────── */

function addTimeout(username, userId, avatar, durationSeconds) {
  if (deathRow.has(username)) return;
  const until = Date.now() / 1000 + Math.max(durationSeconds, 1);
  timeouts.set(username, { username, user_id: userId, avatar_url: avatar, until });
  render();
}

function addBan(username, userId, avatar) {
  if (timeouts.has(username)) {
    timeouts.delete(username);
    removeCard(timeoutCards, timeoutList, timeoutWalkers, username);
  }
  deathRow.set(username, { username, user_id: userId, avatar_url: avatar, since: Date.now() / 1000 });
  render();
}

function executeEntry(target, method, actor) {
  let entry = deathRow.get(target);
  if (!entry) return;
  deathRow.delete(target);
  render();
  runExecution(method, entry, actor);
}

/* ── connection ───────────────────────────────────────────────────────── */

function setStatus(state, label) {
  const dot = document.getElementById("statusDot");
  const text = document.getElementById("statusText");
  dot.className = `status-dot ${state}`;
  text.textContent = label ?? state;
}

function onIrcLine(line) {
  if (line.startsWith("PING")) {
    socket.send(line.replace("PING", "PONG"));
    return;
  }
  const parsed = parseIrcLine(line);
  if (!parsed) return;
  if (parsed.command === "CLEARCHAT") handleClearchat(parsed.tags, parsed.trailing);
  else if (parsed.command === "PRIVMSG") handlePrivmsg(parsed.tags, parsed.trailing);
}

function openSocket() {
  if (socket) {
    socket.onclose = null;
    socket.close();
    socket = null;
  }

  setStatus("disconnected", "connecting…");
  socket = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

  socket.addEventListener("open", () => {
    socket.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
    socket.send("PASS SCHMOOPIIE");
    socket.send(`NICK justinfan${Math.floor(10000 + Math.random() * 89999)}`);
    socket.send(`JOIN #${currentChannel}`);
    setStatus("connected", `#${currentChannel}`);
  });

  socket.addEventListener("message", (event) => {
    for (const line of event.data.split("\r\n")) {
      if (line) onIrcLine(line);
    }
  });

  socket.addEventListener("close", () => {
    setStatus("disconnected", "reconnecting…");
    window.setTimeout(openSocket, 3000);
  });

  socket.addEventListener("error", () => setStatus("error", "connection error"));
}

function handleConnect() {
  const chanVal = document.getElementById("channelInput").value.trim().toLowerCase();
  if (!chanVal) {
    setStatus("error", "enter a channel name");
    return;
  }
  currentChannel = chanVal;

  const btn = document.getElementById("connectBtn");
  btn.textContent = "Disconnect";
  btn.className = "ctrl-btn btn-disconnect";
  btn.onclick = handleDisconnect;

  openSocket();
}

function handleDisconnect() {
  if (socket) {
    socket.onclose = null;
    socket.close();
    socket = null;
  }
  timeouts.clear();
  deathRow.clear();
  render();
  setStatus("disconnected", "disconnected");

  const btn = document.getElementById("connectBtn");
  btn.textContent = "Connect";
  btn.className = "ctrl-btn btn-connect";
  btn.onclick = handleConnect;
}

/* ── local simulation ─────────────────────────────────────────────────── */

async function simulate(action) {
  const username = document.getElementById("usernameInput").value.trim().toLowerCase();
  if (!username) return;

  if (action === "untimeout") {
    timeouts.delete(username);
    removeCard(timeoutCards, timeoutList, timeoutWalkers, username);
    return;
  }
  if (action === "unban") {
    deathRow.delete(username);
    removeCard(deathRowCards, deathRowList, deathRowWalkers, username);
    return;
  }

  const avatar = await resolveAvatar(username);

  if (action === "timeout") {
    addTimeout(username, username, avatar, 300);
  } else if (action === "ban") {
    addBan(username, username, avatar);
  } else if (action === "execute") {
    if (!deathRow.has(username)) addBan(username, username, avatar);
    const method = document.getElementById("methodSelect").value;
    executeEntry(username, method, "simulation");
  }
}

/* ── bootstrap ────────────────────────────────────────────────────────── */

document.getElementById("connectBtn").onclick = handleConnect;

for (const btn of document.querySelectorAll("[data-action]")) {
  btn.addEventListener("click", () => simulate(btn.dataset.action));
}

window.setInterval(render, 1000);
render();
requestAnimationFrame(tickMotion);

const _autoChannel = new URLSearchParams(window.location.search).get("channel");
if (_autoChannel) {
  document.getElementById("channelInput").value = _autoChannel;
  handleConnect();
}
